<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reservas | Mayaby</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo"><i class="fas fa-umbrella-beach"></i><span>Mayaby</span></div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
                <a href="habitaciones.html" class="nav-item"><i class="fas fa-bed"></i><span>Habitaciones</span></a>
                <a href="transporte.html" class="nav-item"><i class="fas fa-van-shuttle"></i><span>Transporte</span></a>
                <a href="limpieza.html" class="nav-item"><i class="fas fa-broom"></i><span>Limpieza</span></a>
                <a href="reservas.html" class="nav-item active"><i class="fas fa-calendar-check"></i><span>Reservas</span></a>
            </nav>
            <div class="sidebar-footer"><div class="hotel-info"><i class="fas fa-clock"></i><span>20 min al aeropuerto</span></div></div>
        </aside>
        <main class="main-content">
            <header class="top-bar"><div class="search-bar"><i class="fas fa-search"></i><input type="text" placeholder="Buscar..."></div><div class="user-info"><i class="fas fa-bell"></i><div class="user-avatar"><span>MA</span></div></div></header>
            <div class="content-area">
                <h1 class="page-title"><i class="fas fa-calendar-check"></i> Sistema de Reservas</h1>
                <div class="form-card"><h3><i class="fas fa-plus-circle"></i> Nueva Reserva</h3><form id="formReservaHotel" class="modern-form" onsubmit="return crearReserva(event)"><div class="form-row"><div class="form-group"><label><i class="fas fa-user"></i> Nombre del Cliente</label><input type="text" id="clienteNombre" placeholder="Ej: María González" required></div><div class="form-group"><label><i class="fas fa-bed"></i> Habitación</label><select id="habitacionSelect" required></select></div></div><div class="form-row"><div class="form-group"><label><i class="fas fa-calendar-alt"></i> Fecha Entrada</label><input type="date" id="fechaEntrada" required></div><div class="form-group"><label><i class="fas fa-calendar-alt"></i> Fecha Salida</label><input type="date" id="fechaSalida" required></div></div><button type="submit" class="btn-primary btn-large"><i class="fas fa-save"></i> Crear Reserva</button></form></div>
                <div class="table-container"><h3><i class="fas fa-list"></i> Reservas Activas</h3><table class="data-table"><thead><tr><th>ID</th><th>Cliente</th><th>Habitación</th><th>Entrada</th><th>Salida</th></tr></thead><tbody id="reservasTableBody"></tbody></table></div>
            </div>
        </main>
    </div>
    <script>
        function cargarReservas(){let reservas=JSON.parse(localStorage.getItem("reservasHotel")||"[]");let tbody=document.getElementById("reservasTableBody");tbody.innerHTML="";reservas.forEach(r=>{tbody.innerHTML+=`<tr><td>${r.id}</td><td>${r.cliente}</td><td>${r.habitacionId}</td><td>${r.fechaEntrada}</td><td>${r.fechaSalida}</td></tr>`;});}
        function cargarHabitacionesDisponibles(){let habitaciones=JSON.parse(localStorage.getItem("habitaciones")||"[]");let select=document.getElementById("habitacionSelect");select.innerHTML='<option value="">Seleccionar habitación</option>';habitaciones.filter(h=>h.estado==="disponible").forEach(hab=>{let opt=document.createElement("option");opt.value=hab.numero;opt.textContent=`${hab.numero} - ${hab.tipo} ($${hab.precio}/noche)`;select.appendChild(opt);});}
        function crearReserva(e){e.preventDefault();let cliente=document.getElementById("clienteNombre").value;let habitacionNumero=parseInt(document.getElementById("habitacionSelect").value);let fechaEntrada=document.getElementById("fechaEntrada").value;let fechaSalida=document.getElementById("fechaSalida").value;if(!cliente||!habitacionNumero||!fechaEntrada||!fechaSalida){alert("Complete todos los campos");return false;}
        let habitaciones=JSON.parse(localStorage.getItem("habitaciones")||"[]");let reservas=JSON.parse(localStorage.getItem("reservasHotel")||"[]");let limpieza=JSON.parse(localStorage.getItem("limpieza")||"[]");let nextId=parseInt(localStorage.getItem("nextReservaId")||"1");let habitacion=habitaciones.find(h=>h.numero===habitacionNumero);if(!habitacion){alert("Habitación no encontrada");return false;}
        if(habitacion.estado!=="disponible"){alert("Habitación no disponible");return false;}
        reservas.push({id:nextId,cliente:cliente,habitacionId:habitacionNumero,fechaEntrada:fechaEntrada,fechaSalida:fechaSalida});habitacion.estado="ocupada";let limp=limpieza.find(l=>l.habitacionId===habitacion.id);if(limp)limp.estadoLimpieza="Pendiente";localStorage.setItem("reservasHotel",JSON.stringify(reservas));localStorage.setItem("habitaciones",JSON.stringify(habitaciones));localStorage.setItem("limpieza",JSON.stringify(limpieza));localStorage.setItem("nextReservaId",nextId+1);document.getElementById("formReservaHotel").reset();cargarReservas();cargarHabitacionesDisponibles();alert(`Reserva creada para ${cliente} en habitación ${habitacionNumero}`);return false;}
        if(!localStorage.getItem("habitaciones")){let habitaciones=[];for(let i=1;i<=40;i++){habitaciones.push({id:i,numero:100+i,tipo:i<=25?"Estándar":"Suite",precio:i<=25?1200:2200,estado:"disponible"});}localStorage.setItem("habitaciones",JSON.stringify(habitaciones));}
        if(!localStorage.getItem("limpieza")){let limpieza=[];for(let i=1;i<=40;i++){limpieza.push({habitacionId:i,estadoLimpieza:"Pendiente",ultimaLimpieza:null});}localStorage.setItem("limpieza",JSON.stringify(limpieza));}
        if(!localStorage.getItem("reservasHotel"))localStorage.setItem("reservasHotel",JSON.stringify([]));if(!localStorage.getItem("nextReservaId"))localStorage.setItem("nextReservaId","1");cargarHabitacionesDisponibles();cargarReservas();
    </script>
</body>
</html>
